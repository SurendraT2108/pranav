<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Learning Performance Analytics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background-color: #f4f6f9; color: #333; line-height: 1.6; }
    header { background: #2c3e50; color: #fff; padding: 1rem; text-align: center; }
    nav { display: flex; justify-content: center; background: #34495e; }
    nav button {
      background: none;
      border: none;
      color: #fff;
      padding: 1rem 1.5rem;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.3s, color 0.3s;
    }
    nav button:hover { background: #2c3e50; }
    nav button.active {
      background: #1abc9c;
      color: #fff;
      border-radius: 4px;
    }
    .container { max-width: 1200px; margin: 2rem auto; padding: 1rem; }
    .card { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 1rem; color: #2c3e50; }
    canvas { width: 100% !important; height: 300px !important; }
    footer { text-align: center; padding: 1rem; background: #2c3e50; color: #fff; margin-top: 2rem; }
    .section { opacity: 0; transform: translateY(20px); transition: all 0.4s ease; display: none; }
    .section.active { display: block; opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <header>
    <h1>E-Learning Performance Analytics</h1>
    <p>Track and visualize student progress</p>
  </header>

  <nav>
    <button id="btn-dashboard" onclick="showSection('dashboard', this)" class="active">Dashboard</button>
    <button id="btn-students" onclick="showSection('students', this)">Students</button>
    <button id="btn-settings" onclick="showSection('settings', this)">Settings</button>
  </nav>

  <div class="container">
    <!-- Dashboard Section -->
    <div id="dashboard" class="section active">
      <div class="card">
        <h2>Course Completion Rate</h2>
        <canvas id="completionChart"></canvas>
      </div>
      <div class="card">
        <h2>Average Scores</h2>
        <canvas id="scoreChart"></canvas>
      </div>
    </div>

    <!-- Students Section -->
    <div id="students" class="section">
      <div class="card">
        <h2>Student Details</h2>
        <table style="width:100%; border-collapse: collapse;">
          <tr style="background:#34495e; color:#fff;">
            <th>Name</th><th>Course</th><th>Progress</th><th>Score</th>
          </tr>
          <tr><td>Alice</td><td>Math</td><td>80%</td><td>85</td></tr>
          <tr><td>Bob</td><td>Science</td><td>60%</td><td>78</td></tr>
          <tr><td>Charlie</td><td>History</td><td>90%</td><td>92</td></tr>
        </table>
      </div>
    </div>

    <!-- Settings Section -->
    <div id="settings" class="section">
      <div class="card">
        <h2>Settings</h2>
        <form>
          <label>Theme:
            <select>
              <option>Light</option>
              <option>Dark</option>
            </select>
          </label><br><br>
          <label>Notifications:
            <input type="checkbox" checked> Enable
          </label><br><br>
          <button type="button">Save Settings</button>
        </form>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 E-Learning Analytics Platform</p>
  </footer>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Section switcher with nav highlight
    function showSection(sectionId, btn) {
      // Hide all sections
      document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
      // Show selected section
      document.getElementById(sectionId).classList.add('active');

      // Remove active class from all buttons
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      // Add active class to clicked button
      btn.classList.add('active');
    }

    // Charts
    const ctx1 = document.getElementById('completionChart').getContext('2d');
    new Chart(ctx1, {
      type: 'doughnut',
      data: {
        labels: ['Completed', 'In Progress', 'Not Started'],
        datasets: [{ data: [65, 25, 10], backgroundColor: ['#27ae60', '#f39c12', '#e74c3c'] }]
      }
    });

    const ctx2 = document.getElementById('scoreChart').getContext('2d');
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: ['Math', 'Science', 'History', 'English'],
        datasets: [{ label: 'Average Score', data: [78, 85, 72, 90], backgroundColor: '#3498db' }]
      },
      options: { scales: { y: { beginAtZero: true } } }
    });
  </script>
</body>
</html>
