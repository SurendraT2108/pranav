<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Learning Performance Analytics</title>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f4f6f9;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: #2c3e50;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #34495e;
    }

    nav a {
      color: #fff;
      padding: 1rem;
      text-decoration: none;
      transition: background 0.3s;
    }

    nav a:hover {
      background: #2c3e50;
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 1rem;
      color: #2c3e50;
    }

    canvas {
      width: 100% !important;
      height: 300px !important;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #2c3e50;
      color: #fff;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>E-Learning Performance Analytics</h1>
    <p>Track and visualize student progress</p>
  </header>

  <nav>
    <a href="#">Dashboard</a>
    <a href="#">Reports</a>
    <a href="#">Students</a>
    <a href="#">Settings</a>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Course Completion Rate</h2>
      <canvas id="completionChart"></canvas>
    </div>

    <div class="card">
      <h2>Average Scores</h2>
      <canvas id="scoreChart"></canvas>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 E-Learning Analytics Platform</p>
  </footer>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Completion Rate Chart
    const ctx1 = document.getElementById('completionChart').getContext('2d');
    new Chart(ctx1, {
      type: 'doughnut',
      data: {
        labels: ['Completed', 'In Progress', 'Not Started'],
        datasets: [{
          data: [65, 25, 10],
          backgroundColor: ['#27ae60', '#f39c12', '#e74c3c']
        }]
      }
    });

    // Average Scores Chart
    const ctx2 = document.getElementById('scoreChart').getContext('2d');
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: ['Math', 'Science', 'History', 'English'],
        datasets: [{
          label: 'Average Score',
          data: [78, 85, 72, 90],
          backgroundColor: '#3498db'
        }]
      },
      options: {
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  </script>
</body>
</html>
